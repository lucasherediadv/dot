# Foot configuration

# Font style and size
font=JetBrainsMono Nerd Font:size=14

# Padding
# pad=5x5

[mouse]
hide-when-typing=yes

# Colors
[colors]
background=1e1e1e
foreground=d4d4d4

# Normal/regular colors (color pallete 0-7)
