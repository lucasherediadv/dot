# Use vi keys
setw -g mode-keys vi
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

# Status bar
set -g status-style "fg=#5b5b5b"
set -g status-position top
set -g status-right ""
set -g status-left ""

# Pane border
set -g pane-border-style "fg=#111111"
set -g pane-active-border-style "fg=#111111"

# Term colors
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ',*:RGB'

# Count the panes from 1
set -g base-index 1
setw -g pane-base-index 1

# Kill panes without confirm
bind -r x kill-pane

# Double tap meta key to toggle last window
bind-key C-b last-window

# Reload configuration file
bind -r r source-file ~/.config/tmux/tmux.conf

# Kill current window and all panes
bind-key & kill-window

