# Change default meta key
unbind C-b
unbind C-a
set -g prefix C-a

# Use vi keys
setw -g mode-keys vi

# Use vi keys to navigate panes
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

# Count the panes from 1
set -g base-index 1
setw -g pane-base-index 1

# Delay on <esc>
set -sg escape-time 10

# Kill panes without confirm
bind -r x kill-pane

# Reload configuration
bind -r r source-file ~/.config/tmux/tmux.conf

# Minimal status bar
set -g status-right ""
set -g status-left ""
set -g status-style "fg=#5b5b5b"
set -g status-position top

# Color the pane border nearly invisible
set -g pane-border-style "fg=#111111"
set -g pane-active-border-style "fg=#111111"

