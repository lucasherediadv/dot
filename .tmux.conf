# History size
set-option -g history-limit 25000

# Set escape time to 10 milliseconds (default value is 500 milliseconds)
set -sg escape-time 10

# Enable mouse mode
set -g mouse on

# Configs for a more minimal status bar
set -g status-right "" # Nothing in status-right
set -g status-left "" # Don't show info about sessions
set -g status-style "fg=#5b5b5b" # Color of status bar
set -g status-position top # Show status bar on top

# Count windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Reload configuration with <prefix>r
unbind r
bind r source-file ~/.tmux.conf

# Remove the pane active border color because I am guided by the cursor
set -g pane-active-border fg=white

# According to neovim checkhealth
set-option -sa terminal-features ",alacritty:RGB"
set-option -g focus-events on

