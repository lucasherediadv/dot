# change default meta key
unbind C-b
unbind C-a
set -g prefix C-a

# add double-tap meta key to toggle last window
bind-key C-a last-window

# create more intuitive split key combos
unbind |
bind | split-window -h
bind '\' split-window -h
bind 'C-\' split-window -h
unbind -
bind - split-window -v
unbind _
bind _ split-window -v

# vi for copy mode
setw -g mode-keys vi

# vi for command status
set -g status-keys vi

# vi keys to navigate panes
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

# avoid cursor movement messing with resize
set -g repeat-time 200

# color the pane border nearly invisible
set -g pane-border-style "fg=#111111"
set -g pane-active-border-style "fg=#111111"

# count windows and panes at 1
set -g base-index 1
setw -g pane-base-index 1

# kill panes and server (be careful, right next to C-c)
bind -r C-x confirm kill-server
bind -r x kill-pane

# reload configuration
bind -r r source-file ~/.config/tmux/tmux.conf

# According to neovim check-health
set-option -sa terminal-features ",alacritty:RGB"
set-option -g focus-events on
set -sg escape-time 10

# disable status (use C-a w insted)
set -g status off

