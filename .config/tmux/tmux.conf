# History size
set-option -g history-limit 25000

# Set escape time to 10 milliseconds (default value is 500 milliseconds)
set -sg escape-time 10

# Enable mouse mode
set -g mouse on

# Configs for a more minimal status bar
set -g status-right ""
set -g status-left ""

# Status bar color
set -g status-style "fg=#5b5b5b"
set -g status-bg default

# Show status bar on top
set -g status-position top

# Determines how frequently the status line is redrawn
set -g status-interval 1

# Count windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Reload configuration with <prefix>r
bind r source-file ~/.config/tmux/tmux.conf

# Remove the pane active border color because I am guided by the cursor
set -g pane-active-border fg=white

# Term colors, these are the correct ones according to neovim checkhealth
set-option -sa terminal-features ",alacritty:RGB"

# According to neovim checkhealth
set-option -g focus-events on

