# Change default meta key.
unbind C-b
unbind C-a
set -g prefix C-a

# Use VI keys.
setw -g mode-keys vi
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

# Easy to remember split pane commands
unbind '"'
unbind %
unbind |
unbind -
bind | split-window -h
bind - split-window -v

# Pane border color.
set -g pane-border-style "fg=#111111"
set -g pane-active-border-style "fg=#111111"

# Term colors.
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ',*:RGB'

# Count the panes from 1.
set -g base-index 1
setw -g pane-base-index 1

# Status bar
set -g status-style "fg=#5b5b5b"
set -g status-position top
set -g status-interval 1
set -g status-right ""
set -g status-left ""

# For VIM.
set -sg escape-time 1
set -g focus-events on

bind-key C-a last-window # Double tap meta key to toggle last window.
bind -r x kill-pane # Kill panes without confirm.
bind-key -r r source-file ~/.config/tmux/tmux.conf # Reload configuration

